<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cordon Bleu - Restaurant Gastronomique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #b87333;
            border-radius: 10px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(184,115,51,0.1) 0%, transparent 70%);
            animation: pulse 20s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-25%, -25%); }
            50% { transform: translate(0%, 0%); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 40px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #b87333, #e09d5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 30px;
        }

        .hero-btn {
            background: linear-gradient(135deg, #b87333, #e09d5e);
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(184,115,51,0.4);
        }

        /* Horaires */
        .hours-banner {
            background: #1a1a1a;
            color: #b87333;
            padding: 15px;
            text-align: center;
            font-size: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(184,115,51,0.3);
        }

        /* Navigation */
        .categories-nav {
            background: rgba(26,26,26,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 15px;
            position: sticky;
            top: 52px;
            z-index: 99;
            border-bottom: 1px solid rgba(184,115,51,0.2);
        }

        .category-btn {
            background: transparent;
            border: 1px solid rgba(184,115,51,0.5);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .category-btn:hover {
            border-color: #b87333;
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #b87333, #e09d5e);
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(184,115,51,0.4);
        }

        /* Produits */
        .products-section {
            padding: 80px 20px;
            background: #0a0a0a;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #b87333, #e09d5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .section-title:after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #b87333, transparent);
            margin: 20px auto 0;
            border-radius: 3px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            transition: 0.4s;
            border: 1px solid rgba(184,115,51,0.2);
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(184,115,51,0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .product-img-wrapper {
            overflow: hidden;
            height: 260px;
            cursor: pointer;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #b87333;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e09d5e;
            margin-bottom: 15px;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #b87333, #e09d5e);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(184,115,51,0.4);
        }

        /* Avis */
        .testimonials-section {
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 100%);
            padding: 80px 20px;
        }

        .testimonials-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .review-form-container {
            background: rgba(30,30,40,0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 50px;
            border: 1px solid rgba(184,115,51,0.3);
        }

        .review-form h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #b87333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(20,20,30,0.8);
            border: 1px solid rgba(184,115,51,0.3);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #b87333;
            box-shadow: 0 0 10px rgba(184,115,51,0.3);
        }

        .star-rating {
            display: flex;
            gap: 10px;
            font-size: 2rem;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .star-rating i {
            color: #555;
            transition: 0.2s;
        }

        .star-rating i.active {
            color: #f39c12;
        }

        .star-rating i:hover {
            transform: scale(1.1);
        }

        .submit-review {
            background: linear-gradient(135deg, #b87333, #e09d5e);
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-review:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(184,115,51,0.4);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .testimonial-card {
            background: rgba(30,30,40,0.6);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            transition: 0.3s;
            border: 1px solid rgba(184,115,51,0.2);
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            border-color: rgba(184,115,51,0.5);
        }

        .testimonial-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .testimonial-author {
            font-size: 1.1rem;
            font-weight: 700;
            color: #b87333;
        }

        .testimonial-date {
            font-size: 0.7rem;
            color: #777;
        }

        .testimonial-stars {
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .testimonial-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ccc;
        }

        /* Carte agrandie */
        .map-section {
            padding: 80px 20px;
            background: #0a0a0a;
        }

        .map-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(30,30,40,0.6);
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid rgba(184,115,51,0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .map-wrapper:hover {
            transform: scale(1.02);
            border-color: rgba(184,115,51,0.6);
        }

        .map-preview {
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: 0.3s;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 20px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Modal Map */
        .map-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .map-modal.active {
            display: flex;
        }

        .map-modal-content {
            width: 95%;
            height: 95%;
            background: #1a1a1a;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .map-modal iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .map-modal-close {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 35px;
            color: white;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Boutons flottants */
        .cart-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #b87333, #e09d5e);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            cursor: pointer;
            z-index: 200;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .cart-fab:hover {
            transform: scale(1.1);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            text-decoration: none;
            z-index: 200;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #b87333, #e09d5e);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            z-index: 300;
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .products-grid { grid-template-columns: 1fr; }
            .testimonials-grid { grid-template-columns: 1fr; }
            .map-preview { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="hero-content">
            <h1>CORDON BLEU</h1>
            <p>L'excellence culinaire à votre service</p>
            <button class="hero-btn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
                Découvrir nos plats <i class="fas fa-arrow-down"></i>
            </button>
        </div>
    </div>

    <div class="hours-banner">
        <i class="far fa-clock"></i> Lundi - Vendredi : 08h00 - 16h30 | Samedi : 09h00 - 14h00
    </div>

    <div class="categories-nav" id="categoriesNav">
        <button class="category-btn active" data-category="all">🍽️ Tous</button>
        <button class="category-btn" data-category="cake">🍰 Cakes</button>
        <button class="category-btn" data-category="menu">🍛 Menus</button>
    </div>

    <div class="products-section" id="products">
        <h2 class="section-title">Nos Spécialités</h2>
        <div id="productsGrid" class="products-grid">
            <div class="loading">⏳ Chargement...</div>
        </div>
    </div>

    <!-- Section Avis -->
    <div class="testimonials-section">
        <div class="testimonials-container">
            <h2 class="section-title">Ce que disent nos clients</h2>
            
            <div class="review-form-container">
                <div class="review-form">
                    <h3><i class="fas fa-pen"></i> Donnez votre avis</h3>
                    <div class="form-group">
                        <input type="text" id="reviewName" placeholder="Votre nom" maxlength="50">
                    </div>
                    <div class="form-group">
                        <div class="star-rating" id="starRating">
                            <i class="fas fa-star active" data-value="1"></i>
                            <i class="fas fa-star active" data-value="2"></i>
                            <i class="fas fa-star active" data-value="3"></i>
                            <i class="fas fa-star active" data-value="4"></i>
                            <i class="fas fa-star active" data-value="5"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <textarea id="reviewMessage" rows="4" placeholder="Votre message..." maxlength="500"></textarea>
                    </div>
                    <button class="submit-review" onclick="submitReview()">
                        <i class="fas fa-paper-plane"></i> Envoyer mon avis
                    </button>
                </div>
            </div>

            <div id="testimonialsGrid" class="testimonials-grid">
                <div class="loading">⏳ Chargement des avis...</div>
            </div>
        </div>
    </div>

    <!-- Carte agrandie -->
    <div class="map-section">
        <h2 class="section-title">📍 Notre emplacement</h2>
        <div class="map-wrapper" id="mapWrapper">
            <img class="map-preview" src="https://images.unsplash.com/photo-1569336415962-a4bd9f69cd07?w=1200" alt="Carte">
            <div style="text-align: center; padding: 15px; background: rgba(0,0,0,0.5);">
                <i class="fas fa-map-marker-alt"></i> Cliquez pour voir la carte en grand
            </div>
        </div>
    </div>

    <a href="https://wa.me/22781734122" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
    <div class="cart-fab" id="cartFab">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="">
    </div>

    <div class="map-modal" id="mapModal">
        <div class="map-modal-content">
            <span class="map-modal-close">&times;</span>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3965.455517811669!2d2.125!3d6.35!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNsKwMjEnMDAuMCJOIDLCsDA3JzMwLjAiRQ!5e0!3m2!1sfr!2s!4v1700000000000!5m2!1sfr!2s" allowfullscreen></iframe>
        </div>
    </div>

    <div class="toast" id="toast">✅ Article ajouté</div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getFirestore, collection, getDocs, addDoc, Timestamp, query, orderBy 
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC458Jy-21YTXBsO6ARmbPlfkC_QBGqwQg",
            authDomain: "restaurant-cordon-bleu.firebaseapp.com",
            projectId: "restaurant-cordon-bleu",
            storageBucket: "restaurant-cordon-bleu.firebasestorage.app",
            messagingSenderId: "425048095776",
            appId: "1:425048095776:web:eaefda3b72a5c5dc8f9045"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];
        let cart = [];
        let currentCategory = 'all';
        let selectedRating = 5;

        // Étoiles
        function initStarRating() {
            const stars = document.querySelectorAll('#starRating i');
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const value = parseInt(star.dataset.value);
                    selectedRating = value;
                    stars.forEach((s, i) => {
                        if (i < value) {
                            s.className = 'fas fa-star active';
                        } else {
                            s.className = 'far fa-star';
                        }
                    });
                });
            });
        }

        // Soumettre avis
        window.submitReview = async function() {
            const nom = document.getElementById('reviewName').value.trim();
            const texte = document.getElementById('reviewMessage').value.trim();
            
            if (!nom) {
                showToast('❌ Veuillez entrer votre nom');
                return;
            }
            if (!texte) {
                showToast('❌ Veuillez entrer votre message');
                return;
            }
            if (texte.length < 10) {
                showToast('❌ Message trop court (10 caractères minimum)');
                return;
            }
            
            try {
                await addDoc(collection(db, 'Témoignages'), {
                    Nom: nom,
                    Texte: texte,
                    Étoiles: selectedRating,
                    Approuvé: false,
                    createdAt: Timestamp.now()
                });
                
                showToast('✅ Merci ! Votre avis sera publié après validation');
                document.getElementById('reviewName').value = '';
                document.getElementById('reviewMessage').value = '';
                
                const stars = document.querySelectorAll('#starRating i');
                stars.forEach((s, i) => {
                    if (i < 5) s.className = 'fas fa-star active';
                    else s.className = 'far fa-star';
                });
                selectedRating = 5;
                
            } catch (error) {
                console.error(error);
                showToast('❌ Erreur lors de l\'envoi');
            }
        };

        // Charger avis approuvés
        async function loadTestimonials() {
            try {
                const q = query(collection(db, 'Témoignages'), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);
                const testimonials = snapshot.docs
                    .filter(doc => doc.data().Approuvé === true)
                    .map(doc => ({
                        id: doc.id,
                        nom: doc.data().Nom || 'Client',
                        texte: doc.data().Texte || '',
                        etoiles: doc.data().Étoiles || 5,
                        date: doc.data().createdAt?.toDate()
                    }));
                
                displayTestimonials(testimonials);
            } catch (error) {
                console.error(error);
            }
        }

        function displayTestimonials(testimonials) {
            const container = document.getElementById('testimonialsGrid');
            if (testimonials.length === 0) {
                container.innerHTML = '<div class="loading">⭐ Aucun avis pour le moment</div>';
                return;
            }
            
            container.innerHTML = testimonials.map(t => `
                <div class="testimonial-card">
                    <div class="testimonial-header">
                        <span class="testimonial-author"><i class="fas fa-user"></i> ${escapeHtml(t.nom)}</span>
                        <span class="testimonial-date">${t.date ? new Date(t.date).toLocaleDateString() : ''}</span>
                    </div>
                    <div class="testimonial-stars">
                        ${'★'.repeat(t.etoiles)}${'☆'.repeat(5 - t.etoiles)}
                    </div>
                    <div class="testimonial-text">"${escapeHtml(t.texte)}"</div>
                </div>
            `).join('');
        }

        // Produits
        async function loadCakes() {
            const snapshot = await getDocs(collection(db, 'cakes'));
            return snapshot.docs.map(doc => ({ id: doc.id, type: 'cake', ...doc.data() }));
        }

        async function loadMenus() {
            const snapshot = await getDocs(collection(db, 'menus'));
            return snapshot.docs.map(doc => ({ id: doc.id, type: 'menu', ...doc.data() }));
        }

        async function loadAllProducts() {
            const [cakes, menus] = await Promise.all([loadCakes(), loadMenus()]);
            allProducts = [...cakes, ...menus];
            displayProducts();
        }

        function displayProducts() {
            const container = document.getElementById('productsGrid');
            let filtered = allProducts;
            if (currentCategory === 'cake') filtered = allProducts.filter(p => p.type === 'cake');
            if (currentCategory === 'menu') filtered = allProducts.filter(p => p.type === 'menu');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">📭 Aucun produit</div>';
                return;
            }
            
            container.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-img-wrapper" onclick="openLightbox('${product.imageUrl || ''}')">
                        <img class="product-image" src="${product.imageUrl || ''}" 
                             alt="${product.Nom}"
                             onerror="this.src='https://via.placeholder.com/300x200?text=Image'">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.Nom)}</div>
                        <div class="product-desc">${escapeHtml((product.Description || '').substring(0, 100))}</div>
                        <div class="product-price">${(product.Prix || 0).toLocaleString()} FCFA</div>
                        <button class="add-to-cart" data-id="${product.id}" data-type="${product.type}">
                            <i class="fas fa-shopping-cart"></i> Ajouter
                        </button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const type = btn.dataset.type;
                    const product = allProducts.find(p => p.id === id && p.type === type);
                    if (product) addToCart(product);
                });
            });
        }

        // Lightbox
        window.openLightbox = function(imgSrc) {
            if (!imgSrc) return;
            document.getElementById('lightboxImg').src = imgSrc;
            document.getElementById('lightbox').classList.add('active');
        };

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Map Modal
        function openMapModal() {
            document.getElementById('mapModal').classList.add('active');
        }

        function closeMapModal() {
            document.getElementById('mapModal').classList.remove('active');
        }

        // Panier
        function addToCart(product) {
            const existing = cart.find(i => i.id === product.id);
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });
            updateCartUI();
            saveCart();
            showToast(`✅ ${product.Nom} ajouté`);
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').textContent = total;
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function loadCart() {
            const saved = localStorage.getItem('cart');
            if (saved) {
                cart = JSON.parse(saved);
                updateCartUI();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Initialisation
        async function init() {
            await loadAllProducts();
            await loadTestimonials();
            loadCart();
            initStarRating();
            
            document.getElementById('lightbox').addEventListener('click', closeLightbox);
            document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
            document.getElementById('mapWrapper').addEventListener('click', openMapModal);
            document.getElementById('mapModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('mapModal')) closeMapModal();
            });
            document.querySelector('.map-modal-close').addEventListener('click', closeMapModal);
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    displayProducts();
                });
            });
            
            document.getElementById('cartFab').addEventListener('click', () => {
                if (cart.length === 0) {
                    showToast('🛒 Panier vide');
                } else {
                    let msg = '🛒 Votre panier :\n';
                    cart.forEach(item => {
                        msg += `\n${item.Nom} x${item.quantity} = ${(item.Prix * item.quantity).toLocaleString()} FCFA`;
                    });
                    msg += `\n\nTotal : ${cart.reduce((s,i)=>s + (i.Prix * i.quantity),0).toLocaleString()} FCFA`;
                    alert(msg);
                }
            });
            
            console.log('✅ Site prêt !');
        }
        
        init();
    </script>
</body>
</html>
